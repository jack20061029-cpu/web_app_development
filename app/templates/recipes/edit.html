{% extends "base.html" %}

{% block title %}編輯食譜 - {{ recipe.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-4">✏️ 編輯食譜</h1>
                
                <form action="{{ url_for('recipe.update_recipe', id=recipe.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">食譜名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" required value="{{ recipe.title }}">
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">簡介</label>
                        <textarea class="form-control" id="description" name="description" rows="2">{{ recipe.description }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="cooking_time_minutes" class="form-label">烹飪時間 (分鐘)</label>
                        <input type="number" class="form-control" id="cooking_time_minutes" name="cooking_time_minutes" min="0" value="{{ recipe.cooking_time_minutes }}">
                    </div>

                    <div class="mb-3">
                        <label for="ingredients" class="form-label">材料</label>
                        <textarea class="form-control" id="ingredients" name="ingredients" rows="5">{{ recipe.ingredients }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="steps" class="form-label">烹飪步驟</label>
                        <textarea class="form-control" id="steps" name="steps" rows="8">{{ recipe.steps }}</textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('recipe.recipe_detail', id=recipe.id) }}" class="btn btn-light">取消</a>
                        <button type="submit" class="btn btn-primary">更新食譜</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
