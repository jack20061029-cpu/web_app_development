{% extends "base.html" %}

{% block title %}首頁 - 食譜列表{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h1 class="h2">我的食譜</h1>
    </div>
</div>

<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {% for recipe in recipes %}
    <div class="col">
        <div class="card h-100 recipe-card">
            <div class="card-body">
                <h5 class="card-title">{{ recipe.title }}</h5>
                <p class="card-text text-muted small">
                    ⏱️ {{ recipe.cooking_time_minutes or 0 }} 分鐘
                </p>
                <p class="card-text text-truncate">{{ recipe.description or '無簡介' }}</p>
            </div>
            <div class="card-footer bg-transparent border-0">
                <a href="{{ url_for('recipe.recipe_detail', id=recipe.id) }}" class="btn btn-outline-primary btn-sm">查看詳情</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12 text-center py-5">
        <p class="text-muted">目前還沒有食譜，快去新增一個吧！</p>
        <a href="{{ url_for('recipe.new_recipe_form') }}" class="btn btn-primary">新增第一篇食譜</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
